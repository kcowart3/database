<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TubeWall</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot" aria-hidden="true"></span>
        <h1>TubeWall</h1>
      </div>

      <form id="add-video-form" class="add-form" autocomplete="off">
        <label for="youtube-url" class="sr-only">YouTube URL</label>
        <input
          id="youtube-url"
          type="url"
          name="youtube-url"
          placeholder="Paste a YouTube link..."
          required
        />
        <button type="submit">Add</button>
      </form>

      <div class="quick-actions">
        <button id="random-video-btn" type="button">Take me to a random video</button>
        <button id="empty-space-btn" type="button">Take me to an empty space</button>
      </div>
    </header>

    <main class="layout">
      <aside class="left-panel">
        <h2>Board Guide</h2>
        <ul>
          <li>Drag anywhere to pan</li>
          <li>Use mouse wheel to zoom</li>
          <li>Thumbnails are aligned on a grid</li>
          <li>Click a tile to open the video</li>
        </ul>
        <p id="tile-count">0 videos</p>
      </aside>

      <section id="viewport" class="viewport" aria-label="Video color wall">
        <div id="board" class="board"></div>
      </section>
    </main>

    <template id="tile-template">
      <article class="tile">
        <a class="tile-link" target="_blank" rel="noopener noreferrer">
          <img class="thumb" alt="" loading="lazy" />
        </a>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
