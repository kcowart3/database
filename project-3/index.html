<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.cdnfonts.com/css/druk-wide-bold" rel="stylesheet" />
  <title>Lux Mori - Entry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&family=Montserrat:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <div class="splash-screen" id="splashScreen">
    <div class="splash-logo-wrap">
      <img class="splash-logo" src="./assets/svg/LM Logo.svg" alt="LM Logo">
    </div>
    <div class="splash-brand">
      <p class="splash-text"><span class="splash-text-word">LUX</span><span class="splash-text-word">MORI</span></p>
      <p class="splash-subtitle" aria-label="THE UNIVERSE OF DYING STARS">
        <span class="splash-subtitle-track" aria-hidden="true">
          <span class="splash-subtitle-char">T</span><span class="splash-subtitle-char">H</span><span class="splash-subtitle-char">E</span><span class="splash-subtitle-char splash-subtitle-space"> </span><span class="splash-subtitle-char">U</span><span class="splash-subtitle-char">N</span><span class="splash-subtitle-char">I</span><span class="splash-subtitle-char">V</span><span class="splash-subtitle-char">E</span><span class="splash-subtitle-char">R</span><span class="splash-subtitle-char">S</span><span class="splash-subtitle-char">E</span><span class="splash-subtitle-char splash-subtitle-space"> </span><span class="splash-subtitle-char">O</span><span class="splash-subtitle-char">F</span><span class="splash-subtitle-char splash-subtitle-space"> </span><span class="splash-subtitle-char">D</span><span class="splash-subtitle-char">Y</span><span class="splash-subtitle-char">I</span><span class="splash-subtitle-char">N</span><span class="splash-subtitle-char">G</span><span class="splash-subtitle-char splash-subtitle-space"> </span><span class="splash-subtitle-char">S</span><span class="splash-subtitle-char">T</span><span class="splash-subtitle-char">A</span><span class="splash-subtitle-char">R</span><span class="splash-subtitle-char">S</span>
        </span>
      </p>
    </div>
    <div class="splash-cta" id="splashCta">
      <button class="splash-btn" id="enterBtn">Enter</button>
    </div>
  </div>

  <script src="./js/audio.js"></script>
  <script>
  (function () {
    var splash = document.getElementById('splashScreen');
    var cta = document.getElementById('splashCta');
    var enterBtn = document.getElementById('enterBtn');

    if (!splash || !cta || !enterBtn) {
      return;
    }

    function showCta() {
      cta.classList.add('is-visible');
    }

    function startSequence() {
      splash.classList.add('is-logo-revealed');
      window.setTimeout(function () {
        splash.classList.add('is-text-visible');
      }, 1900);
      window.setTimeout(showCta, 2900);
    }

    function enterSystem() {
      if (window.luxAudio && typeof window.luxAudio.enableAmbient === "function") {
        window.luxAudio.enableAmbient();
      } else {
        localStorage.setItem("luxMoriAmbientEnabled", "1");
      }
      splash.classList.add('is-exiting');
      window.setTimeout(function () {
        window.location.href = './milkyway.html';
      }, 500);
    }

    enterBtn.addEventListener('click', enterSystem);

    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      splash.classList.add('is-logo-revealed');
      splash.classList.add('is-text-visible');
      showCta();
    } else {
      window.setTimeout(startSequence, 80);
    }
  })();
  </script>
</body>
</html>
