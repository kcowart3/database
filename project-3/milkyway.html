<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lux Mori - Milky Way</title>
  <link href="https://fonts.cdnfonts.com/css/druk-wide-bold" rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&family=Montserrat:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body class="milkyway-page">
  <div class="film-grain" aria-hidden="true"></div>
  <div class="space-backdrop sol-bg" aria-hidden="true"></div>

  <header class="top-bar">
    <div class="title-block">
      <p class="splash-text" id="mainTitle"><span class="splash-text-word">LUX</span><span class="splash-text-word">MORI</span></p>
      <p class="splash-subtitle">THE UNIVERSE OF DYING STARS</p>
    </div>
  </header>

  <main class="milkyway-layout">
    <section class="milkyway-stage" aria-label="Milky Way ring map">
      <div class="milkyway-ring mw-1"></div>
      <div class="milkyway-ring mw-2"></div>
      <div class="milkyway-ring mw-3"></div>
      <div class="milkyway-ring mw-4"></div>
      <div class="milkyway-ring mw-5"></div>
      <button class="galaxy-core galaxy-star" id="galaxy-core" title="Galactic Core" aria-label="Inspect galactic core">
        <img src="./assets/svg/LM Black hole.svg" alt="" />
      </button>
      <div class="orbit-sol">
        <button class="sol-star galaxy-star" id="sol-star" title="Sol System" aria-label="Navigate to Sol System"></button>
      </div>
    </section>
    <button id="search-systems" class="side-btn side-btn-left" title="Search solar systems" aria-label="Search solar systems">⌕</button>
    <button id="catalog-systems" class="side-btn side-btn-left side-btn-left-lower" title="Open discovered systems catalog" aria-label="Open discovered systems catalog">≡</button>
    <button id="create-system" class="side-btn side-btn-right" title="Create solar system" aria-label="Create solar system">+</button>
    <button id="reset-systems" class="side-btn side-btn-right side-btn-right-lower" title="Reset all forged systems" aria-label="Reset all forged systems">↺</button>
    <aside id="hud-message" class="hud-message" role="status" aria-live="polite"></aside>
  </main>

  <dialog id="catalog-modal" class="planet-modal">
    <form method="dialog" class="modal-content">
      <button class="close" id="catalog-close" aria-label="Close catalog">x</button>
      <h3>Systems Catalog</h3>
      <p class="search-instruction">Discoverers are grouped once, with every system they forged listed beneath.</p>
      <div id="catalog-content" class="catalog-content"></div>
    </form>
  </dialog>

  <dialog id="celestial-modal" class="planet-modal">
    <form method="dialog" class="modal-content">
      <button class="close" aria-label="Close details">x</button>
      <h3 id="celestial-name">Celestial Body</h3>
      <div class="modal-preview-box">
        <img id="celestial-image" src="./assets/svg/Planet.svg" alt="" />
        <p id="celestial-meta" class="preview-meta">Telemetry online</p>
      </div>
      <p id="celestial-description" class="makeup"></p>
      <button type="button" id="celestial-open-btn" class="search-btn">Open System Page</button>
    </form>
  </dialog>

  <script src="./js/audio.js"></script>
  <script src="./js/milkyway.js"></script>
</body>
</html>
