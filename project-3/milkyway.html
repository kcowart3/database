<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lux Mori - Milky Way</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;700&family=Montserrat:wght@500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="film-grain" aria-hidden="true"></div>
  <div class="space-backdrop sol-bg" aria-hidden="true"></div>

  <header class="top-bar">
    <div class="title-block">
      <h1>LUX MORI</h1>
      <p class="eyebrow">THE UNIVERSE OF DYING STARS</p>
    </div>
    <button id="return-sol" class="glyph-btn" title="Return to Sol" aria-label="Return to Sol">✦</button>
  </header>

  <main class="milkyway-layout">
    <section class="milkyway-stage" aria-label="Milky Way ring map">
      <div class="milkyway-ring mw-1"></div>
      <div class="milkyway-ring mw-2"></div>
      <div class="milkyway-ring mw-3"></div>
      <div class="milkyway-ring mw-4"></div>
      <div class="milkyway-ring mw-5"></div>
    </section>
    <button id="view-galaxies" class="side-btn side-btn-left" title="View community galaxies" aria-label="View community galaxies">◎</button>
    <button id="create-galaxy" class="side-btn side-btn-right" title="Make your galaxy" aria-label="Make your galaxy">+</button>
    <aside id="hud-message" class="hud-message" role="status" aria-live="polite"></aside>
  </main>

  <script src="./milkyway.js"></script>
</body>
</html>
