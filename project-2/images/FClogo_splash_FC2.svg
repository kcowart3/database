<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 647.28 144">
  <defs>
    <style>
      .cls-1 {
        fill: aqua;
      }

      .cls-2 {
        fill: #ff68ba;
      }

      .logoWrap {
        transform-origin: 50% 50%;
        transform-box: fill-box;
        animation: logoLandFlashShake 2000ms steps(12) forwards;
      }

      .base {
        opacity: 1;
        animation: baseHide 2000ms steps(1) forwards;
      }

      .final {
        opacity: 0;
        animation: finalShow 2000ms steps(1) forwards;
      }

      .swordWrap {
        opacity: 1;
        animation: swordDropChoppy 2000ms steps(16) forwards, swordHide 2000ms steps(1) forwards;
      }

      /* Choppy retro fall: hard-stepped frames + tiny "bounce" */
      @keyframes swordDropChoppy {
        0% {
          transform: translate(0px, -240px);
        }
        52% {
          transform: translate(0px, -60px);
        }
        60% {
          transform: translate(0px, 0px);
        }
        64% {
          transform: translate(0px, 10px);
        }
        70% {
          transform: translate(0px, 0px);
        }
        76% {
          transform: translate(0px, 5px);
        }
        82% {
          transform: translate(0px, 0px);
        }
        100% {
          transform: translate(0px, 0px);
        }
      }

      /* Swap from layered pieces to the final combined logo right at "impact" */
      @keyframes swordHide {
        0%,
        61% {
          opacity: 1;
        }
        62%,
        100% {
          opacity: 0;
        }
      }

      @keyframes baseHide {
        0%,
        61% {
          opacity: 1;
        }
        62%,
        100% {
          opacity: 0;
        }
      }

      @keyframes finalShow {
        0%,
        61% {
          opacity: 0;
        }
        62%,
        100% {
          opacity: 1;
        }
      }

      /* Whole-logo slight shake + short white flash on landing */
      @keyframes logoLandFlashShake {
        0%,
        58% {
          transform: translate(0px, 0px);
          filter: none;
        }
        60% {
          transform: translate(-3px, 2px);
          filter: invert(1);
        }
        63% {
          transform: translate(3px, -2px);
          filter: none;
        }
        66% {
          transform: translate(-2px, -1px);
          filter: invert(1);
        }
        69% {
          transform: translate(2px, 1px);
          filter: none;
        }
        72% {
          transform: translate(-2px, 1px);
          filter: invert(1);
        }
        76% {
          transform: translate(2px, 0px);
          filter: none;
        }
        80%,
        100% {
          transform: translate(0px, 0px);
          filter: none;
        }
      }
    </style>
  </defs>

